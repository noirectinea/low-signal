<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LOW SIGNAL / Mobile review</title>
    <style>
      :root { color-scheme: dark; font-family: Arial, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #11110f; color: #e7e7e1; }
      header {
        position: sticky; top: 0; z-index: 2; display: flex;
        justify-content: space-between; gap: 24px; padding: 18px 24px;
        border-bottom: 1px solid #ffffff24; background: #11110fe8;
        text-transform: uppercase; letter-spacing: .14em; font-size: 11px;
        backdrop-filter: blur(14px);
      }
      main {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 390px));
        align-items: start; justify-content: center; gap: 30px; padding: 30px;
      }
      figure { margin: 0; border: 1px solid #ffffff24; background: #1b1a18; }
      figcaption {
        display: flex; justify-content: space-between; padding: 12px 14px;
        border-bottom: 1px solid #ffffff24; text-transform: uppercase;
        letter-spacing: .12em; font-size: 10px; color: #ffffffa3;
      }
      img { display: block; width: 100%; height: auto; }
      .wide { grid-column: 1 / -1; max-width: 768px; justify-self: center; }
    </style>
  </head>
  <body>
    <header><span>LOW SIGNAL / Mobile review</span><span>375 / 390 / 430 / 768</span></header>
    <main>
      <figure><figcaption><span>Home</span><span>390</span></figcaption><img src="home-390.png" alt="LOW SIGNAL mobile home" /></figure>
      <figure><figcaption><span>Collections</span><span>390</span></figcaption><img src="collections-390.png" alt="LOW SIGNAL mobile collections" /></figure>
      <figure><figcaption><span>Men</span><span>390</span></figcaption><img src="men-390.png" alt="LOW SIGNAL mobile men catalog" /></figure>
      <figure><figcaption><span>Women</span><span>390</span></figcaption><img src="women-390.png" alt="LOW SIGNAL mobile women catalog" /></figure>
      <figure><figcaption><span>Product</span><span>390</span></figcaption><img src="product-390.png" alt="LOW SIGNAL mobile product page" /></figure>
      <figure><figcaption><span>Lookbook</span><span>390</span></figcaption><img src="lookbook-390.png" alt="LOW SIGNAL mobile lookbook" /></figure>
      <figure><figcaption><span>About</span><span>390</span></figcaption><img src="about-390.png" alt="LOW SIGNAL mobile about page" /></figure>
      <figure><figcaption><span>Cart</span><span>390</span></figcaption><img src="cart-390.png" alt="LOW SIGNAL mobile cart" /></figure>
      <figure><figcaption><span>Menu</span><span>390</span></figcaption><img src="menu-390.png" alt="LOW SIGNAL mobile menu" /></figure>
      <figure><figcaption><span>Filters</span><span>390</span></figcaption><img src="filters-390.png" alt="LOW SIGNAL mobile filters" /></figure>
      <figure><figcaption><span>Home check</span><span>375</span></figcaption><img src="home-375.png" alt="LOW SIGNAL home at 375 pixels" /></figure>
      <figure><figcaption><span>Home check</span><span>430</span></figcaption><img src="home-430.png" alt="LOW SIGNAL home at 430 pixels" /></figure>
      <figure class="wide"><figcaption><span>Tablet transition</span><span>768</span></figcaption><img src="home-768.png" alt="LOW SIGNAL home at 768 pixels" /></figure>
    </main>
  </body>
</html>
