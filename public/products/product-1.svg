<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" />
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="400" height="500" fill="url(#grad)" />
  
  <!-- Film grain effect -->
  <rect width="400" height="500" fill="url(#grad)" opacity="0.1" filter="url(#noise)" />
  
  <!-- Simple vertical lines (fabric detail) -->
  <line x1="100" y1="50" x2="100" y2="450" stroke="#3d3d3d" stroke-width="1" opacity="0.3" />
  <line x1="200" y1="50" x2="200" y2="450" stroke="#3d3d3d" stroke-width="1" opacity="0.2" />
  <line x1="300" y1="50" x2="300" y2="450" stroke="#3d3d3d" stroke-width="1" opacity="0.3" />
  
  <!-- Random spots (film imperfections) -->
  <circle cx="80" cy="100" r="3" fill="#5a5a5a" opacity="0.4" />
  <circle cx="320" cy="200" r="2" fill="#5a5a5a" opacity="0.3" />
  <circle cx="100" cy="350" r="2.5" fill="#5a5a5a" opacity="0.35" />
  
  <!-- Text overlay -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="16" fill="#8a8a8a" text-anchor="middle" opacity="0.6">
    Product Image
  </text>
</svg>