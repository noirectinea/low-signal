<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d3d3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#grad5)" />
  
  <!-- Subtle texture -->
  <circle cx="150" cy="150" r="120" fill="#3d3d3d" opacity="0.08" />
  <circle cx="250" cy="350" r="100" fill="#5a5a5a" opacity="0.06" />
  
  <!-- Edge vignette -->
  <rect x="0" y="0" width="50" height="500" fill="#000" opacity="0.25" />
  <rect x="350" y="0" width="50" height="500" fill="#000" opacity="0.25" />
  <rect x="0" y="0" width="400" height="50" fill="#000" opacity="0.2" />
  <rect x="0" y="450" width="400" height="50" fill="#000" opacity="0.3" />
  
  <!-- Center line -->
  <line x1="200" y1="0" x2="200" y2="500" stroke="#5a5a5a" stroke-width="1" opacity="0.15" />
  
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" opacity="0.35">
    Minimal
  </text>
</svg>