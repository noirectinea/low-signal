<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad4" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#grad4)" />
  
  <!-- Horizontal pleats/folds -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="#5a5a5a" stroke-width="8" opacity="0.2" />
  <line x1="0" y1="160" x2="400" y2="160" stroke="#5a5a5a" stroke-width="6" opacity="0.15" />
  <line x1="0" y1="240" x2="400" y2="240" stroke="#5a5a5a" stroke-width="7" opacity="0.18" />
  <line x1="0" y1="320" x2="400" y2="320" stroke="#5a5a5a" stroke-width="6" opacity="0.15" />
  <line x1="0" y1="400" x2="400" y2="400" stroke="#5a5a5a" stroke-width="8" opacity="0.2" />
  
  <!-- Dust particles -->
  <circle cx="60" cy="150" r="1.5" fill="#a0a0a0" opacity="0.3" />
  <circle cx="340" cy="280" r="1" fill="#a0a0a0" opacity="0.25" />
  <circle cx="200" cy="420" r="2" fill="#a0a0a0" opacity="0.35" />
  
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" opacity="0.4">
    Drape
  </text>
</svg>