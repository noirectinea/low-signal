<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad7" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#grad7)" />
  
  <!-- Draped fabric -->
  <path d="M 0 0 Q 100 100 200 80 Q 300 60 400 100 L 400 0 Z" fill="#1a1a1a" opacity="0.3" />
  <path d="M 0 150 Q 80 200 200 180 Q 320 160 400 220 L 400 140 Z" fill="#3d3d3d" opacity="0.2" />
  
  <!-- Shadows -->
