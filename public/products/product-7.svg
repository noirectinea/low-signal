  <line x1="100" y1="250" x2="150" y2="350" stroke="#5a5a5a" stroke-width="2" opacity="0.2" />
  <line x1="250" y1="200" x2="280" y2="320" stroke="#5a5a5a" stroke-width="2" opacity="0.2" />
  
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" opacity="0.35">
