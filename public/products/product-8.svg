<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#grad8)" />
  
  <!-- Seams -->
  <line x1="200" y1="0" x2="200" y2="500" stroke="#5a5a5a" stroke-width="2" opacity="0.3" stroke-dasharray="20,10" />
  
  <!-- Side seams -->
  <line x1="100" y1="0" x2="110" y2="500" stroke="#5a5a5a" stroke-width="1" opacity="0.15" />
  <line x1="300" y1="0" x2="290" y2="500" stroke="#5a5a5a" stroke-width="1" opacity="0.15" />
  
  <!-- Fold marks -->
  <path d="M 200 50 Q 180 200 200 350" stroke="#8a8a8a" stroke-width="1.5" fill="none" opacity="0.2" />
  <path d="M 200 50 Q 220 200 200 350" stroke="#8a8a8a" stroke-width="1.5" fill="none" opacity="0.2" />
  
  <!-- Texture -->
  <rect x="50" y="100" width="300" height="300" fill="#5a5a5a" opacity="0.05" />
  
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" opacity="0.35">
    Trousers
