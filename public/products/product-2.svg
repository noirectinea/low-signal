<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <filter id="vignette">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <rect width="400" height="500" fill="url(#grad2)" />
  
  <!-- Diagonal stripes (fabric pattern) -->
  <line x1="0" y1="0" x2="400" y2="400" stroke="#3d3d3d" stroke-width="30" opacity="0.15" />
  <line x1="50" y1="0" x2="450" y2="400" stroke="#3d3d3d" stroke-width="30" opacity="0.15" />
  <line x1="-50" y1="0" x2="350" y2="400" stroke="#3d3d3d" stroke-width="30" opacity="0.15" />
  
  <!-- Wrinkles/creases -->
  <path d="M 50 150 Q 200 200 350 180" stroke="#5a5a5a" stroke-width="2" fill="none" opacity="0.25" />
  <path d="M 100 300 Q 200 350 300 320" stroke="#5a5a5a" stroke-width="2" fill="none" opacity="0.2" />
  
  <!-- Corner burn effect -->
  <circle cx="20" cy="20" r="80" fill="#000" opacity="0.3" />
  <circle cx="380" cy="480" r="100" fill="#000" opacity="0.2" />
  
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" opacity="0.5">
    Textile
  </text>
</svg>