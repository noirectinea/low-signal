<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LOW SIGNAL mobile contact sheet</title>
    <style>
      :root {
        color: #11110f;
        background: #d8d9d3;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-width: 2200px;
        padding: 28px;
      }

      header {
        border-bottom: 1px solid rgb(0 0 0 / 0.18);
        display: grid;
        gap: 10px;
        margin-bottom: 24px;
        padding-bottom: 18px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 34px;
        font-weight: 400;
        letter-spacing: 0.02em;
        line-height: 0.95;
        margin: 0;
      }

      p {
        color: rgb(0 0 0 / 0.56);
        font-size: 10px;
        letter-spacing: 0.16em;
        line-height: 1.7;
        margin: 0;
        max-width: 720px;
      }

      .grid {
        align-items: start;
        display: grid;
        gap: 22px;
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      figure {
        border-top: 1px solid rgb(0 0 0 / 0.18);
        margin: 0;
        padding-top: 12px;
      }

      img {
        background: #e5e6e1;
        border: 1px solid rgb(0 0 0 / 0.14);
        display: block;
        height: auto;
        width: 100%;
      }

      figcaption {
        color: rgb(0 0 0 / 0.62);
        font-size: 10px;
        letter-spacing: 0.14em;
        line-height: 1.5;
        margin-top: 10px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>LOW SIGNAL / Mobile 390</h1>
      <p>
        Final mobile screenshots generated from the local Next site, using real
        project assets, product data, fonts, and routes. Full-page captures are
        included for every main route; state captures show mobile menu and
        catalog filters.
      </p>
    </header>

    <main class="grid">
      <figure>
        <img src="./screenshots/home-full-390.png" alt="Home full mobile screenshot" />
        <figcaption>01 / Home</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/collections-full-390.png" alt="Collections full mobile screenshot" />
        <figcaption>02 / Collections</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/men-full-390.png" alt="Men collection full mobile screenshot" />
        <figcaption>03 / Men catalog</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/women-full-390.png" alt="Women collection full mobile screenshot" />
        <figcaption>04 / Women catalog</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/lookbook-full-390.png" alt="Lookbook full mobile screenshot" />
        <figcaption>05 / Lookbook</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/about-full-390.png" alt="About full mobile screenshot" />
        <figcaption>06 / About</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/product-field-jacket-full-390.png" alt="Field Jacket product full mobile screenshot" />
        <figcaption>07 / Product / Field Jacket</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/cart-route-full-390.png" alt="Cart route mobile screenshot" />
        <figcaption>08 / Cart route auth state</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/state-mobile-menu-390.png" alt="Open mobile menu screenshot" />
        <figcaption>09 / Mobile menu open</figcaption>
      </figure>
      <figure>
        <img src="./screenshots/state-men-filters-open-390.png" alt="Open catalog filters screenshot" />
        <figcaption>10 / Men filters open</figcaption>
      </figure>
    </main>
  </body>
</html>
